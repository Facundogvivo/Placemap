<!DOCTYPE html>

    <nav class="navbar navbar-dark bg-primary">

    <main>
      <nav style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
          <li class="breadcrumb-item"><a href="casaEjemplo.html">Casa ejemplo</a></li>
          <li class="breadcrumb-item active" aria-current="page">Casa 1</li>
        </ol>
      </nav>
      <label>Desde... (origen)</label>
      <select name="desde" id="desde" class="form-select" aria-label="Default select example" onchange=" cargarHacia();" >
        <option selected>Seleccione Desde...</option>
      </select>
      <label>Hacia... (destino)</label>
      <select name="hacia" id="hacia" class="form-select" aria-label="Default select example">
        <option selected>Seleccione Hacia...</option>
      </select>
      <div class="d-grid gap-2 d-md-flex left-content-md-end">
        <button class="btn btn-primary" type="button" id="botonMostrar" onclick="mensaje(); pisos();">Mostrar Niveles</button>
        <button class="btn btn-primary" type="button" id="botonMostrar" onclick="caminos();">Mostrar Recorrido</button>
    </div>
      <section>
        <p id="titulo"></p>
      </section>
      <section class="left mostrar" id="pisoN1">
        <p class="center">Piso 1</p>
        <canvas id="canvas1" width="400" height="400" style="border:3px solid #ccc;">
          <img src="assets/img/Casas/piso1.jpg" alt="Piso 1">

        </canvas>
      </section>
      <section class="left mostrar" id="pisoN2">

        </canvas>

      <section class="left mostrar" id="pisoN3">
